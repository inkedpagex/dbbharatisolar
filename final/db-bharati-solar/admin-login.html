<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - DB Bharati Solar</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .login-card {
            max-width: 450px;
            margin: 120px auto;
            padding: 50px;
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.06);
            text-align: center;
        }

        .login-card .logo {
            justify-content: center;
            margin-bottom: 40px;
        }

        .form-control {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            outline: none;
            background: #fafafa;
            text-align: center;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .form-control:focus {
            border-color: var(--accent);
            background: white;
        }
    </style>
</head>

<body style="background: #fafafa;">
    <div class="container">
        <div class="login-card reveal">
            <div class="logo">
                <img src="assets/img/logo.jpg" alt="Logo">
                DB BHARATI SOLAR
            </div>
            <h2 style="margin-bottom: 10px;">Operator Login</h2>
            <p style="margin-bottom: 35px; color: var(--text-muted);">Access strictly restricted to authorized
                personnel.</p>

            <form id="login-form">
                <input type="password" id="password" class="form-control" placeholder="••••••••" required autofocus>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 18px;">Enter
                    Dashboard</button>
            </form>
            <p id="error-msg" style="color: #ef4444; margin-top: 20px; font-weight: 600; display: none;">🔒 Access
                Denied. Incorrect Credentials.</p>
        </div>
        <div class="parent-branding" style="margin-top: 40px; text-align: center;">
            <div class="parent-logo" style="justify-content: center; opacity: 0.5;">
                <img src="assets/img/sr green pulse (1).jpeg" alt="SR Pulse Media">
                <span>SR PULSE MEDIA GROUP</span>
            </div>
        </div>
    </div>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/ui.js"></script>
    <script>
        const form = document.getElementById('login-form');
        const passInput = document.getElementById('password');
        const errorMsg = document.getElementById('error-msg');

        form.onsubmit = (e) => {
            e.preventDefault();
            if (window.AUTH.login(passInput.value)) {
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
                passInput.value = '';
            }
        };
    </script>
</body>

</html>

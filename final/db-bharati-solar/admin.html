<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - DB Bharati Solar</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            background: white;
            padding: 30px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 40px;
        }

        .work-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .work-card:hover {
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
        }

        .work-card img {
            width: 100px;
            height: 75px;
            object-fit: cover;
            border-radius: 8px;
        }

        .btn-delete {
            color: #ef4444;
            background: #fff1f2;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 992px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body style="background: #fafafa;">
    <div class="container" style="padding: 60px 20px;">
        <div class="admin-header reveal">
            <div class="logo">
                <img src="assets/img/logo.jpg" alt="Logo">
                <span>ADMIN PANEL</span>
            </div>
            <div style="display: flex; gap: 15px;">
                <a href="index.html" class="btn btn-outline" style="padding: 10px 20px;">View Site</a>
                <button id="logout-btn" class="btn btn-primary" style="background: #111;">Logout</button>
            </div>
        </div>

        <div class="admin-grid">
            <!-- Add New Work -->
            <div>
                <div class="card">
                    <h3 style="margin-bottom: 25px;">Add New Project</h3>
                    <form id="add-work-form">
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px;">Project Title*</label>
                            <input type="text" name="title" id="work-title"
                                style="width:100%; padding:10px; border:1px solid var(--border);"
                                placeholder="e.g. Skyline Residency" required>
                        </div>
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px;">Category*</label>
                            <select name="category" id="work-category"
                                style="width:100%; padding:10px; border:1px solid var(--border);" required>
                                <option value="Residential">Residential</option>
                                <option value="Commercial">Commercial</option>
                                <option value="Industrial">Industrial</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; margin-bottom: 5px;">Project Photo*</label>
                            <input type="file" id="work-file" accept="image/*" style="width:100%;" required>
                        </div>
                        <button type="submit" id="add-btn" class="btn btn-primary" style="width: 100%;">Upload &
                            Save</button>
                    </form>
                </div>
            </div>

            <!-- List Existing Work -->
            <div class="card">
                <h3 style="margin-bottom: 25px;">Existing Projects</h3>
                <div id="admin-work-list">
                    <p>Loading projects...</p>
                </div>
            </div>
        </div>

        <footer style="margin-top: 80px; padding: 40px 0; border-top: 1px solid var(--border); text-align: center;">
            <div class="container">
                <p style="color: var(--text-muted); font-size: 0.9rem;">&copy; 2026 DB Bharati Solar Admin Panel.</p>
                <div class="parent-branding">
                    <span
                        style="font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; display: block;">Parent
                        Company</span>
                    <div class="parent-logo" style="justify-content: center;">
                        <img src="assets/img/sr green pulse (1).jpeg" alt="SR Green Pulse Media">
                        <span>SR GREEN PULSE MEDIA</span>
                    </div>
                </div>
            </div>
        </footer>

        <script src="assets/js/config.js"></script>
        <script src="assets/js/auth.js"></script>
        <script src="assets/js/api.js"></script>
        <script src="assets/js/ui.js"></script>
        <script>
            // Protected Route
            window.AUTH.protectRoute();

            const form = document.getElementById('add-work-form');
            const listContainer = document.getElementById('admin-work-list');
            const logoutBtn = document.getElementById('logout-btn');
            const addBtn = document.getElementById('add-btn');

            logoutBtn.onclick = () => window.AUTH.logout();

            async function loadWorks() {
                listContainer.innerHTML = '<p>Loading...</p>';
                const res = await window.API.getWorks();
                if (res.success && res.data) {
                    if (res.data.length === 0) {
                        listContainer.innerHTML = '<p>No projects yet.</p>';
                        return;
                    }
                    listContainer.innerHTML = res.data.map(item => `
                    <div class="work-card fade-in">
                        <img src="${item.thumbUrl || item.imageUrl}" alt="thumb">
                        <div class="work-card-info">
                            <strong>${item.title}</strong><br>
                            <small style="color:var(--text-muted)">${item.category}</small>
                        </div>
                        <button class="btn-delete" onclick="confirmDelete('${item.id}', '${item.title}')">Delete</button>
                    </div>
                `).join('');
                } else {
                    listContainer.innerHTML = '<p>Failed to load projects.</p>';
                }
            }

            form.onsubmit = async (e) => {
                e.preventDefault();
                const fileInput = document.getElementById('work-file');
                const titleInput = document.getElementById('work-title');
                const catInput = document.getElementById('work-category');

                if (!fileInput.files[0]) return;

                window.UI.setLoading('add-btn', true);
                addBtn.textContent = 'Uploading to ImgBB...';

                const uploadRes = await window.API.uploadToImgBB(fileInput.files[0]);
                if (!uploadRes.success) {
                    window.UI.showToast(uploadRes.message, 'error');
                    window.UI.setLoading('add-btn', false);
                    addBtn.textContent = 'Upload & Save';
                    return;
                }

                addBtn.textContent = 'Saving to Sheet...';

                const workData = {
                    title: titleInput.value,
                    category: catInput.value,
                    imageUrl: uploadRes.imageUrl,
                    thumbUrl: uploadRes.thumbUrl,
                    deleteUrl: uploadRes.deleteUrl
                };

                const saveRes = await window.API.addWork(workData);

                window.UI.setLoading('add-btn', false);
                addBtn.textContent = 'Upload & Save';

                if (saveRes.success) {
                    window.UI.showToast('Project added successfully!', 'success');
                    form.reset();
                    loadWorks();
                } else {
                    window.UI.showToast('Failed to save to database.', 'error');
                }
            };

            window.confirmDelete = async (id, title) => {
                if (confirm(`Are you sure you want to delete "${title}"?`)) {
                    const res = await window.API.deleteWorkById(id);
                    if (res.success) {
                        window.UI.showToast('Project deleted.', 'success');
                        loadWorks();
                    } else {
                        window.UI.showToast('Deletion failed.', 'error');
                    }
                }
            };

            window.addEventListener('DOMContentLoaded', loadWorks);
        </script>
</body>

</html>

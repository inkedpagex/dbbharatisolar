<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Work - DB Bharati Solar</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            gap: 20px;
            flex-wrap: wrap;
            background: #fbfbfb;
            padding: 30px;
            border-radius: var(--radius-md);
        }

        .search-input {
            padding: 16px 24px;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 350px;
            outline: none;
            font-family: inherit;
            font-size: 1rem;
        }

        .search-input:focus {
            border-color: var(--accent);
            background: white;
        }

        .filter-select {
            padding: 16px 24px;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            outline: none;
            background: white;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/img/logo.jpg" alt="Logo">
                DB BHARATI SOLAR
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="work.html">Our Work</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="header-actions">
                <a href="https://wa.me/918445911649" class="btn btn-outline">WhatsApp</a>
            </div>
        </div>
    </header>

    <main class="container" style="padding: 120px 30px;">
        <div class="text-center reveal">
            <h1 class="section-title">Our Project Gallery</h1>
            <p class="section-subtitle">A collection of precision-engineered solar installations that are changing the
                way India consumes energy.</p>
        </div>

        <div class="filter-bar reveal">
            <input type="text" id="search-work" class="search-input" placeholder="Search projects by title...">
            <select id="filter-category" class="filter-select">
                <option value="All">All Projects</option>
                <option value="Residential">Residential</option>
                <option value="Commercial">Commercial</option>
                <option value="Industrial">Industrial</option>
            </select>
        </div>

        <div id="gallery-grid" class="gallery-grid reveal">
            <!-- Initial content loaded via script -->
        </div>

        <div id="pagination" class="text-center" style="margin-top: 80px; display: none;">
            <button id="load-more" class="btn btn-outline">Load More Projects</button>
        </div>
    </main>

    <footer style="padding: 100px 0 50px; background: #fafafa; border-top: 1px solid var(--border);">
        <div class="container">
            <div class="footer-bottom" style="text-align: center;">
                <p style="color: var(--text-muted);">&copy; 2026 DB Bharati Solar.</p>
                <div class="parent-branding">
                    <span
                        style="font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; display: block;">Parent
                        Company</span>
                    <div class="parent-logo" style="justify-content: center;">
                        <img src="assets/img/sr green pulse (1).jpeg" alt="SR Green Pulse Media">
                        <span>SR GREEN PULSE MEDIA</span>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <a href="https://wa.me/918445911649" class="whatsapp-float" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" width="35">
    </a>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script>
        let allWorks = [];
        let itemsToShow = 9;

        async function initGallery() {
            const grid = document.getElementById('gallery-grid');

            const staticProjects = [
                { id: 's1', title: 'Skyline Residency Agra', category: 'Residential', imageUrl: 'assets/img/project-1.jpg' },
                { id: 's2', title: 'Vikas Plaza Rooftop', category: 'Commercial', imageUrl: 'assets/img/project-2.jpg' },
                { id: 's3', title: 'Industrial Complex Setup', category: 'Industrial', imageUrl: 'assets/img/project-3.jpg' },
                { id: 's4', title: 'Townhouse Solar Power', category: 'Residential', imageUrl: 'assets/img/project-4.jpg' },
                { id: 's5', title: 'Mall Installation Project', category: 'Commercial', imageUrl: 'assets/img/project-5.jpg' },
                { id: 's6', title: 'Premium Rooftop System', category: 'Residential', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.38 AM.jpeg' },
                { id: 's7', title: 'Solar Energy Plant', category: 'Commercial', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.44 AM (1).jpeg' },
                { id: 's8', title: 'Grid-Connected Solar', category: 'Industrial', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.44 AM (2).jpeg' },
                { id: 's9', title: 'Modern Solar Setup', category: 'Residential', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.44 AM.jpeg' },
                { id: 's10', title: 'Clean Power Solution', category: 'Commercial', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.45 AM (1).jpeg' },
                { id: 's11', title: 'Corporate Solar Hub', category: 'Industrial', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.45 AM (2).jpeg' },
                { id: 's12', title: 'Eco Friendly Panels', category: 'Residential', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.45 AM.jpeg' },
                { id: 's13', title: 'Green Energy Project', category: 'Commercial', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.46 AM (1).jpeg' },
                { id: 's14', title: 'High Efficiency Solar', category: 'Industrial', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.46 AM (2).jpeg' },
                { id: 's15', title: 'Sustainable Rooftop', category: 'Residential', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.46 AM (3).jpeg' },
                { id: 's16', title: 'Solar Special Offer Unit', category: 'Commercial', imageUrl: 'assets/img/WhatsApp Image 2026-03-02 at 9.48.46 AM.jpeg' },
                { id: 's17', title: 'Smart Solar Installation', category: 'Industrial', imageUrl: 'assets/img/sr green pulse (1).jpeg' }
            ];

            // Show static projects immediately for premium feel
            allWorks = [...staticProjects];
            applyFilters();

            // Load additional dynamic works in background
            const res = await window.API.getWorks();
            if (res.success && res.data && res.data.length > 0) {
                allWorks = [...staticProjects, ...res.data];
                applyFilters();
            }
        }

        function renderGallery(items) {
            const grid = document.getElementById('gallery-grid');
            const paginationDiv = document.getElementById('pagination');
            const displayList = items.slice(0, itemsToShow);

            if (displayList.length === 0) {
                grid.innerHTML = '<p class="text-center">No projects found for the selected filter.</p>';
                paginationDiv.style.display = 'none';
                return;
            }

            grid.innerHTML = displayList.map(item => `
                <div class="gallery-item reveal" onclick="window.UI.openLightbox('${item.imageUrl}', '${item.title}')">
                    <img src="${item.imageUrl}" alt="${item.title}">
                    <div class="gallery-info">
                        <div class="gallery-cat">${item.category}</div>
                        <div class="gallery-title">${item.title}</div>
                    </div>
                </div>
            `).join('');

            paginationDiv.style.display = items.length > itemsToShow ? 'block' : 'none';

            if (window.UI && window.UI.initAnimations) window.UI.initAnimations();
        }

        const searchInput = document.getElementById('search-work');
        const categorySelect = document.getElementById('filter-category');
        const loadMoreBtn = document.getElementById('load-more');

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const category = categorySelect.value;
            const filtered = allWorks.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(searchTerm);
                const matchesCat = category === 'All' || item.category === category;
                return matchesSearch && matchesCat;
            });
            renderGallery(filtered);
        }

        searchInput.oninput = applyFilters;
        categorySelect.onchange = applyFilters;
        loadMoreBtn.onclick = () => {
            itemsToShow += 6;
            applyFilters();
        };

        window.addEventListener('DOMContentLoaded', initGallery);
    </script>
</body>

</html>
